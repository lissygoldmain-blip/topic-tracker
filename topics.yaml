  - name: "Politics & world"
    description: >
      US politics and global news. This is a "need to know" filter, not a
      firehose. Be highly selective — surface only developments that materially
      change something: major legislation passed or blocked, election results,
      significant court decisions, international conflicts escalating or
      resolving, diplomatic shifts, major policy implementations.

      EXPLICITLY SKIP: partisan hot takes, social media outrage cycles,
      incremental polling updates, punditry, horse-race political coverage,
      and doom-spiral content that generates anxiety without actionable
      information. If an item is primarily about reactions to an event rather
      than the event itself, score it low.

      Include genuinely significant global news that is underreported in
      US mainstream media. Prioritize coverage with direct impact on NYC,
      Queens immigrant communities, arts funding, LGBTQ+ rights, or
      labor/worker issues.
    importance: medium
    urgency: low

    source_categories:
      - news

    polling:
      frequent: []

      discovery:
        - source: guardian
          terms:
            - "US politics"
            - "global news"
            - "international"
          filters: {section: "world"}
        - source: nytimes
