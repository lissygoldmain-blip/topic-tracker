  - name: "Health research"
    description: >
      Personal health & ailment research: new treatments, clinical trials,
      FDA approvals, and scientific papers relevant to conditions I follow.
      Replace placeholder terms below with your actual conditions.
    importance: high
    urgency: low

    source_categories:
      - science
      - news

    polling:
      frequent:
        - source: pubmed
          # Replace with search terms for your specific conditions, e.g.:
          # "sickle cell gene therapy", "crohn's disease biologics",
          # "migraine CGRP treatment", "long covid mechanisms"
          terms:
            - "YOUR CONDITION treatment 2026"
            - "YOUR CONDITION clinical trial"
          filters:
            retmax: 10
            sort: date

        - source: rss
          filters:
            feeds:
              - "https://www.statnews.com/feed/"
              - "https://www.technologyreview.com/feed/"

      discovery:
        - source: biorxiv
          terms:
            - "YOUR CONDITION"
          filters:
            days_back: 14
            max_results: 20
        - source: medrxiv
          terms:
            - "YOUR CONDITION"
          filters:
            days_back: 14
            max_results: 20
        - source: semantic_scholar
          terms:
            - "YOUR CONDITION treatment"
          filters:
            limit: 15
        - source: arxiv
          terms:
            - "YOUR CONDITION therapy"
          filters:
            max_results: 10
            # Add arXiv category codes if relevant, e.g.:
            # categories: ["q-bio.GN", "q-bio.TO"]

        - source: pubmed
          terms:
            - "YOUR CONDITION drug approval"
          filters:
            retmax: 20

        - source: rss
          filters:
            feeds:
              - "https://feeds.nature.com/nature/rss/current"
              - "https://www.science.org/rss/news_current.xml"

      broad:
        - source: google_news
          terms:
            - "YOUR CONDITION new treatment"
            - "YOUR CONDITION FDA approved"
        - source: gdelt
          terms:
            - "YOUR CONDITION breakthrough"

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.75

    llm_filter:
      novelty_threshold: 0.65
      tags:
        - clinical_trial
        - fda_approval
        - new_treatment
        - study_published
        - drug_approval
        - breakthrough
        - noise

    escalation:
      triggers:
        - tag: fda_approval
          bump_to: high
          duration_hours: 168
        - tag: clinical_trial
          bump_to: high
          duration_hours: 48
      auto_revert: true

  - name: "Jobs"
    description: >
      Performing arts and event production jobs in NYC. Target roles: Production Associate,
      Production Coordinator, Production Manager, Event Operations Coordinator, Stage Manager
      (institutional only — not touring), Artistic Programming Coordinator/Associate,
      Artist Services Associate, Technical Director (small institutions only).

      Full-time permanent preferred ($55K minimum, targeting $60–75K). Freelance/overhire
      welcomed at major institutions. Contract acceptable with clear pathway. Remote acceptable
      for coordination, programming, or administrative roles where presence isn't required.
      NYC metro only — no relocation. Queens or transit-accessible preferred.

      PRIORITY organizations (boost relevance): Lincoln Center / LCPA, Jazz at Lincoln Center,
      The Public Theater / Joe's Pub, Brooklyn Academy of Music (BAM), New York Philharmonic,
      Carnegie Hall, Park Avenue Armory, Queens Theatre, Queens Museum, Kupferberg Center,
      CIG member institutions broadly, Soho Rep and peer presenters, National Sawdust, Roulette,
      Barbès, Jalopy, festivals and residency programs, presenter collectives with strong
      artistic identity, small orgs with outsized curatorial reputation.

      BOOST signals: jazz, world music, global music, presenting, multidisciplinary programming,
      community-rooted NYC mission, "load-in," "changeover," "run of show," "advancing,"
      "artist liaison," "artist services," CIG member.

      FLAG or deprioritize: Kennedy Center (hard exclude — skip entirely), listings that
      claim full-time but appear on-call-shaped (no benefits, irregular hours language),
      full-time roles at small orgs with no salary disclosure, any org with known anti-union
      or exploitative labor practices at scale.
    importance: high
    urgency: high

    source_categories:
      - jobs

    polling:
      frequent:
        - source: adzuna
          terms:
            - "production associate performing arts"
            - "production coordinator theater"
            - "stage manager institutional"
            - "artist services associate"
            - "event operations coordinator arts"
          filters:
            location: "New York"
            max_days_old: 7
            sort_by: date

        - source: indeed
          terms:
            - "production associate performing arts New York"
            - "production coordinator theater NYC"
            - "artistic programming coordinator New York"
            - "artist services associate NYC"
          filters:
            location: "New York, NY"
            fromage: 7
            sort: date

        - source: playbill_jobs
          terms:
            - "production"
            - "stage manager"
            - "artist services"
            - "programming"

      discovery:
        - source: usitt_jobs
          terms: []

        - source: adzuna
          terms:
            - "production manager arts nonprofit"
            - "technical director performing arts"
            - "arts administrator programming NYC"
            - "event production coordinator nonprofit"
          filters:
            location: "New York"
            max_days_old: 14

        - source: indeed
          terms:
            - "production manager arts organization NYC"
            - "technical director small theater New York"
            - "presenting organization coordinator NYC"
          filters:
            location: "New York, NY"
            fromage: 14

      broad:
        - source: adzuna
          terms:
            - "performing arts production New York"
            - "jazz presenting coordinator NYC"
            - "world music production associate"
          filters:
            location: "New York"
            max_days_old: 30

    notifications:
      push: true
      email: weekly_digest
      novelty_push_threshold: 0.65

    llm_filter:
      novelty_threshold: 0.45
      tags:
        - new_posting
        - priority_org
        - union
        - non_union
        - full_time
        - contract
        - freelance_overhire
        - flag_no_salary
        - flag_suspicious_ft
        - internship
        - noise

    escalation:
      triggers:
        - tag: priority_org
          bump_to: urgent
          duration_hours: 72
        - tag: new_posting
          bump_to: high
          duration_hours: 48
      auto_revert: true

  - name: "Film & TV"
    description: >
      Film and TV releases curated for taste — not volume. Surface things worth
      actually watching, not every new release.

      STRONG YES: A24, Neon, Searchlight, MUBI, Criterion-adjacent, IFC Films;
      queer and trans stories; music documentaries and performing arts films;
      NYC-set films with a real sense of place; international and world cinema;
      films by queer, Black, or underrepresented directors; small prestige films
      with singular vision; documentary features on arts, culture, or social
      justice; anything with strong word-of-mouth from trusted tastemakers.

      DEPRIORITIZE: Marvel, DC, superhero films, franchise sequels, generic
      blockbusters, Disney live-action remakes, films without a distinct
      artistic identity. Do not surface a film just because it has a large
      marketing budget or wide release.

      For TV: prestige limited series, queer-led shows, documentary series.
      Not procedurals, reality TV (except Drag Race — surface that separately),
      or generic streaming content.

      Only flag something as immediately relevant if it is releasing within
      30 days, just opened, or just hit streaming. Skip distant announcements.
    importance: low
    urgency: low

    source_categories:
      - entertainment
      - news

    polling:
      frequent: []

      discovery:
        - source: tmdb
          filters:
            media_type: both
            days_ahead: 45
            region: US
            max_results: 10
        - source: rss
          filters:
            feeds:
              - "https://www.indiewire.com/feed/"
              - "https://www.rogerebert.com/feed"
              - "https://deadline.com/feed/"
        - source: google_news
          terms:
            - "A24 film release"
            - "Neon film release"
            - "queer film festival"
            - "LGBTQ film premiere"

      broad:
        - source: google_news
          terms:
            - "NYC film opening"
            - "performing arts documentary"
            - "music documentary 2026"

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.75

    llm_filter:
      novelty_threshold: 0.65
      tags:
