  - name: "NYC theater & arts"
    description: >
      Theater, performance, dance, gallery openings, and arts news in New York City.
      Off-Broadway, off-off-Broadway, Queens venues, and major institutions.
    importance: high
    urgency: medium

    source_categories:
      - news
      - feeds
      - social

    polling:
      frequent:
        - source: rss
          filters:
            feeds:
              - "https://www.theatermania.com/rss"
              - "https://www.americantheatre.org/feed/"
              - "https://playbill.com/rss/news"
              - "https://www.broadwayworld.com/rss/news.cfm"
        - source: google_news
          terms:
            - "NYC theater"
            - "New York City arts"
            - "off-broadway"

      discovery:
        - source: rss
          filters:
            feeds:
              - "https://hyperallergic.com/feed/"
              - "https://www.artsjournal.com/feed"
              - "https://gothamist.com/feed"
        - source: guardian
          terms: ["New York theater", "NYC performance art"]
          filters: {section: "stage"}
        - source: nytimes
          terms: ["New York theater", "NYC arts"]
        - source: reddit
          subreddits: [nyc, AskNYC, theater]
          terms: ["NYC theater", "off broadway"]
        - source: bluesky
          terms: ["NYC theater", "offbroadway"]

      broad:
        - source: gdelt
          terms: ["New York City theater arts performance"]
        - source: google_news
          terms: ["Queens theater", "Queens arts", "Jackson Heights arts"]

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.75

    llm_filter:
      novelty_threshold: 0.6
      tags:
        - opening_night
        - closing_soon
        - free_event
        - tickets_available
        - review
        - announcement
        - noise

    escalation:
      triggers:
        - tag: opening_night
          bump_to: medium
          duration_hours: 48
      auto_revert: true

