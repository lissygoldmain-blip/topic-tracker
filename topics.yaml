  - name: "Immigration & ICE"
    description: >
      Immigration enforcement activity in New York City — especially Queens,
      Jackson Heights, Flushing, and surrounding neighborhoods. ICE operations,
      arrests, detentions, and community alerts. Also covers federal immigration
      policy changes, court decisions affecting immigrants, and local sanctuary
      policies.

      Jackson Heights and Flushing are the highest priority locations (user
      lives and works there). Flag any confirmed or credible reports of
      enforcement activity in these areas immediately.

      Include: confirmed ICE activity in NYC/Queens, policy changes with direct
      local impact, know-your-rights resources, community organization updates
      (RAICES, Make the Road NY, New Sanctuary Coalition), court injunctions
      or rulings affecting enforcement. Include credible secondhand reports
      from community organizations even if not in major news outlets.

      Deprioritize: general national immigration debates without local impact,
      partisan commentary, and unconfirmed social media rumors without
      corroboration.
    importance: high
    urgency: high

    source_categories:
      - news
      - feeds
      - social

    polling:
      frequent:
        - source: google_news
          terms:
            - "ICE raid Queens New York"
            - "ICE arrest Jackson Heights"
            - "ICE enforcement New York City"
            - "immigration raid NYC"
        - source: rss
          filters:
            feeds:
              - "https://www.thecity.nyc/feed/"
              - "https://qns.com/feed/"
              - "https://gothamist.com/feed"

      discovery:
        - source: reddit
          subreddits: [nyc, JacksonHeights, queensnyc, immigration]
          terms: ["ICE", "immigration enforcement", "raid"]
        - source: bluesky
          terms: ["ICE Queens", "ICE Jackson Heights", "ICE NYC", "immigration enforcement NYC"]
        - source: nytimes
          terms: ["ICE New York", "immigration enforcement Queens"]
        - source: guardian
          terms: ["ICE New York", "immigration enforcement New York"]

      broad:
