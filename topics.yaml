topics:
  - name: "Keiji Kaneko suit"
    description: "Fruit of the Loom x Keiji Kaneko double-breasted athletic formal suit"
    importance: high
    urgency: medium

    source_categories:
      - shopping
      - news
      - social

    polling:
      frequent:
        - source: google_news
          terms: ["Keiji Kaneko suit", "Fruit of the Loom Kaneko"]
        - source: ebay
          terms: ["keiji kaneko suit", "kaneko athletic formal double"]
          filters:
            price_max: 300
      discovery:
        - source: grailed
          terms: ["kaneko fruit of the loom", "kaneko athletic suit"]
        - source: mercari
          terms: ["kaneko suit"]
        - source: google_news
          terms: ["fruit of the loom collaboration 2026"]
