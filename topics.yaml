topics:
  - name: "Keiji Kaneko suit"
    description: "Fruit of the Loom x Keiji Kaneko double-breasted athletic formal suit"
    importance: high
    urgency: medium

    source_categories:
      - shopping
      - news
      - social

    polling:
      frequent:
        - source: google_news
          terms: ["Keiji Kaneko suit", "Fruit of the Loom Kaneko"]
        - source: ebay
          terms: ["keiji kaneko suit", "kaneko athletic formal double"]
          filters:
            price_max: 300
      discovery:
        - source: grailed
          terms: ["kaneko fruit of the loom", "kaneko athletic suit"]
        - source: mercari
          terms: ["kaneko suit"]
        - source: google_news
          terms: ["fruit of the loom collaboration 2026"]
      broad:
        - source: google_news
          terms: ["Keiji Kaneko"]

    notifications:
      push: true
      email: weekly_digest
      novelty_push_threshold: 0.7

    llm_filter:
      novelty_threshold: 0.65
      semantic_dedup_threshold: 0.85
      tags:
        - new_listing
        - price_drop
        - upcoming_drop
        - restock_rumored
        - drop_confirmed
        - sold_out
        - noise

    escalation:
      triggers:
        - tag: drop_confirmed
          bump_to: urgent
          duration_hours: 72
        - tag: upcoming_drop
          bump_to: high
          duration_hours: 48
        - tag: restock_rumored
          bump_to: high
          duration_hours: 24
      auto_revert: true

  - name: "NYC theater & arts"
    description: >
      Theater, performance, dance, gallery openings, and arts news in New York City.
      Off-Broadway, off-off-Broadway, Queens venues, and major institutions.
    importance: high
    urgency: low

    source_categories:
      - news
      - feeds
      - social

    polling:
      frequent:
        - source: rss
          filters:
            feeds:
              - "https://www.theatermania.com/rss"
              - "https://www.americantheatre.org/feed/"
              - "https://playbill.com/rss/news"
        - source: google_news
          terms:
            - "NYC theater"
            - "New York City arts"
            - "off-broadway"

      discovery:
        - source: rss
          filters:
            feeds:
              - "https://hyperallergic.com/feed/"
              - "https://www.artsjournal.com/feed"
              - "https://gothamist.com/feed"
        - source: guardian
          terms: ["New York theater", "NYC performance art"]
          filters: {section: "stage"}
        - source: nytimes
          terms: ["New York theater", "NYC arts"]
        - source: reddit
          subreddits: [nyc, AskNYC, theater]
          terms: ["NYC theater", "off broadway"]
        - source: bluesky
          terms: ["NYC theater", "offbroadway"]

      broad:
        - source: gdelt
          terms: ["New York City theater arts performance"]
        - source: google_news
          terms: ["Queens theater", "Queens arts", "Jackson Heights arts"]

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.75

    llm_filter:
      novelty_threshold: 0.6
      tags:
        - opening_night
        - closing_soon
        - free_event
        - tickets_available
        - review
        - announcement
        - noise

    escalation:
      triggers:
        - tag: opening_night
          bump_to: medium
          duration_hours: 48
      auto_revert: true

  - name: "Queens & NYC local"
    description: >
      Hyperlocal news for Queens, NYC. Community events, development, transit,
      food, politics. Jackson Heights and Flushing focus but all five boroughs.
    importance: high
    urgency: low

    source_categories:
      - news
      - feeds
      - social

    polling:
      frequent:
        - source: rss
          filters:
            feeds:
              - "https://qns.com/feed/"
              - "https://www.thecity.nyc/feed/"
              - "https://gothamist.com/feed"
        - source: google_news
          terms:
            - "Jackson Heights Queens"
            - "Flushing Queens"
            - "Queens New York news"

      discovery:
        - source: rss
          filters:
            feeds:
              - "https://nyc.streetsblog.org/feed/"
              - "https://www.untappedcities.com/latest/rss"
              - "https://6sqft.com/feed/"
        - source: reddit
          subreddits: [JacksonHeights, queensnyc, AskNYC, FlusHing]
          terms: []
        - source: nytimes
          terms: ["Jackson Heights", "Flushing Queens", "Queens New York"]
          filters: {section: "nyregion"}
        - source: bluesky
          terms: ["Jackson Heights", "Flushing Queens", "Queens NYC"]

      broad:
        - source: guardian
          terms: ["New York City Queens neighborhood"]
        - source: gdelt
          terms: ["Jackson Heights New York", "Flushing New York"]

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.72

    llm_filter:
      novelty_threshold: 0.6
      tags:
        - development
        - transit
        - community_event
        - food_opening
        - politics
        - free_event
        - noise

    escalation:
      triggers: []
      auto_revert: true

  - name: "Substack picks"
    description: >
      Newsletters from independent writers covering NYC arts, culture, theater,
      and Queens. Add Substack handles you follow to the feeds list.
    importance: low
    urgency: low

    source_categories:
      - feeds

    polling:
      frequent: []

      discovery:
        - source: rss
          filters:
            feeds:
              # Format: https://{handle}.substack.com/feed
              # Add any Substacks you follow here — every public Substack has RSS
              - "https://gothamist.com/feed"  # placeholder until you add real Substacks

      broad: []

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.7

    llm_filter:
      novelty_threshold: 0.55
      tags:
        - essay
        - review
        - event_preview
        - longread
        - noise

    escalation:
      triggers: []
      auto_revert: true

  - name: "Health research"
    description: >
      Personal health & ailment research: new treatments, clinical trials,
      FDA approvals, and scientific papers relevant to conditions I follow.
      Replace placeholder terms below with your actual conditions.
    importance: high
    urgency: low

    source_categories:
      - science
      - news

    polling:
      frequent:
        - source: pubmed
          # Replace with search terms for your specific conditions, e.g.:
          # "sickle cell gene therapy", "crohn's disease biologics",
          # "migraine CGRP treatment", "long covid mechanisms"
          terms:
            - "YOUR CONDITION treatment 2026"
            - "YOUR CONDITION clinical trial"
          filters:
            retmax: 10
            sort: date

        - source: rss
          filters:
            feeds:
              - "https://www.statnews.com/feed/"
              - "https://www.technologyreview.com/feed/"

      discovery:
        - source: arxiv
          terms:
            - "YOUR CONDITION therapy"
          filters:
            max_results: 10
            # Add arXiv category codes if relevant, e.g.:
            # categories: ["q-bio.GN", "q-bio.TO"]

        - source: pubmed
          terms:
            - "YOUR CONDITION drug approval"
          filters:
            retmax: 20

        - source: rss
          filters:
            feeds:
              - "https://feeds.nature.com/nature/rss/current"
              - "https://www.science.org/rss/news_current.xml"

      broad:
        - source: google_news
          terms:
            - "YOUR CONDITION new treatment"
            - "YOUR CONDITION FDA approved"
        - source: gdelt
          terms:
            - "YOUR CONDITION breakthrough"

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.75

    llm_filter:
      novelty_threshold: 0.65
      tags:
        - clinical_trial
        - fda_approval
        - new_treatment
        - study_published
        - drug_approval
        - breakthrough
        - noise

    escalation:
      triggers:
        - tag: fda_approval
          bump_to: high
          duration_hours: 168
        - tag: clinical_trial
          bump_to: high
          duration_hours: 48
      auto_revert: true

  - name: "Jobs"
    description: >
      Theater, arts, production, and stage management jobs in NYC.
      Includes off-Broadway, off-off-Broadway, major institutions,
      and adjacent roles (production manager, TD, LD, SD, props).
      Add or remove terms to match what you're actually looking for.
    importance: high
    urgency: low

    source_categories:
      - jobs

    polling:
      frequent:
        - source: indeed
          terms:
            - "stage manager New York"
            - "production manager theater NYC"
            - "lighting designer theater NYC"
          filters:
            location: "New York, NY"
            fromage: 7
            sort: date

        - source: adzuna
          terms:
            - "stage manager"
            - "production manager theater"
            - "theater arts NYC"
          filters:
            location: "New York"
            max_days_old: 7
            sort_by: date

      discovery:
        - source: playbill_jobs
          terms:
            - "stage manager"
            - "production manager"
            - "lighting designer"

        - source: usitt_jobs
          terms: []

        - source: indeed
          terms:
            - "technical director theater NYC"
            - "props master NYC"
            - "sound designer theater New York"
            - "costume designer theater NYC"
          filters:
            location: "New York, NY"
            fromage: 14

        - source: adzuna
          terms:
            - "off broadway production"
            - "arts administrator NYC"
            - "theater general manager"
          filters:
            location: "New York"
            max_days_old: 14

        - source: google_news
          terms:
            - "NYC theater jobs hiring"
            - "off-broadway hiring 2026"

      broad:
        - source: adzuna
          terms:
            - "stage management"
            - "theater production"
          filters:
            location: "New York"
            max_days_old: 30

    notifications:
      push: true
      email: weekly_digest
      novelty_push_threshold: 0.7

    llm_filter:
      novelty_threshold: 0.5
      tags:
        - new_posting
        - union
        - non_union
        - full_time
        - contract
        - internship
        - noise

    escalation:
      triggers:
        - tag: new_posting
          bump_to: high
          duration_hours: 48
      auto_revert: true

  - name: "Film & TV"
    description: >
      Upcoming movie and TV releases, production news, and entertainment announcements.
      Covers theatrical releases, streaming premieres, and NYC-relevant theater adaptations.
    importance: low
    urgency: low

    source_categories:
      - entertainment
      - news

    polling:
      frequent: []

      discovery:
        # Upcoming releases in the next 90 days (no terms = discover mode)
        - source: tmdb
          filters:
            media_type: both
            days_ahead: 90
            region: US
            max_results: 15
        # Entertainment news from established outlets
        - source: rss
          filters:
            feeds:
              - "https://deadline.com/feed/"
              - "https://variety.com/feed/"
              - "https://www.indiewire.com/feed/"
        - source: google_news
          terms:
            - "movie release 2026"
            - "new TV show premiere"

      broad:
        # Track specific franchises or studios you care about
        # Add terms here like: ["A24", "HBO", "Neon", "Searchlight"]
        - source: tmdb
          terms: []
          filters:
            language: en-US
        - source: google_news
          terms:
            - "NYC theater adaptation film"
            - "Broadway musical movie"

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.75

    llm_filter:
      novelty_threshold: 0.6
      tags:
        - release_date_announced
        - trailer_dropped
        - now_playing
        - streaming_premiere
        - production_news
        - nyc_screening
        - noise

    escalation:
      triggers: []
      auto_revert: true

  - name: "AI & tech research"
    description: >
      AI, machine learning, and adjacent technology research. Preprints,
      model releases, papers, and applied AI news.
    importance: low
    urgency: low

    source_categories:
      - science
      - news
      - social

    polling:
      frequent:
        - source: hacker_news
          terms:
            - "large language model"
            - "AI safety"
            - "machine learning"

        - source: arxiv
          terms:
            - "large language model"
            - "diffusion model"
          filters:
            max_results: 15
            categories: ["cs.AI", "cs.LG", "cs.CL"]

      discovery:
        - source: rss
          filters:
            feeds:
              - "https://www.technologyreview.com/feed/"
              - "https://feeds.arstechnica.com/arstechnica/index"

        - source: pubmed
          terms:
            - "artificial intelligence clinical"
            - "machine learning healthcare"
          filters:
            retmax: 10

      broad:
        - source: gdelt
          terms:
            - "artificial intelligence research"
        - source: google_news
          terms:
            - "AI model release"
            - "LLM benchmark"

    notifications:
      email: weekly_digest
      novelty_push_threshold: 0.7

    llm_filter:
      novelty_threshold: 0.6
      tags:
        - model_release
        - paper_published
        - benchmark
        - safety_research
        - product_launch
        - noise

    escalation:
      triggers: []
      auto_revert: true
